<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a12">
<meta property="og:title" content="20億円の夢 — Rich Man Simulator">
<meta property="og:description" content="당신의 시작 자본으로 20억엔을 향해 도전하세요. 부동산, 주식, 창업 — 10년간의 경제 시뮬레이션 게임">
<meta property="og:type" content="website">
<title>20億円の夢 — Rich Man Simulator</title>
<style>
/* === RESET & BASE === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  line-height:1.6;min-height:100vh;
  overflow-x:hidden;-webkit-tap-highlight-color:transparent;
}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}

/* === CSS VARIABLES === */
:root{
  --bg:#0a0a12;--bg-card:#14142a;--bg-elevated:#1e1e38;
  --accent:#4a90d9;--accent-dim:#2a5070;
  --gold:#f0c040;--green:#22c55e;--green-dim:#16a34a;
  --red:#ef4444;--red-dim:#b91c1c;--orange:#f59e0b;
  --text:#f0f0f0;--text-dim:#8a8a9a;--text-faint:#555568;
  --border:#2a2a3e;--border-bright:#3a3a52;
}

/* === COMPONENTS === */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:48px;padding:14px 24px;border:none;border-radius:12px;
  font-size:1rem;font-weight:600;color:var(--text);cursor:pointer;
  background:var(--bg-elevated);border:1px solid var(--border);
  transition:all .15s ease;width:100%;
}
.btn:active{transform:scale(.97);border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:active{background:var(--accent-dim)}
.btn-decision{
  width:100%;min-height:72px;padding:16px;
  background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:12px;color:var(--text);text-align:left;cursor:pointer;
  transition:all .15s ease;font-family:inherit;
}
.btn-decision:active{transform:scale(.98);border-color:var(--accent)}
.btn-decision .title{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:8px}
.btn-decision .desc{font-size:.85rem;color:var(--text-dim);margin-top:4px}
.btn-decision .tag{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:8px;background:var(--bg-card);color:var(--text-dim);margin-top:6px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* === PROGRESS BAR === */
.progress-bar{height:8px;background:var(--bg-elevated);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:4px;transition:width .6s ease}

/* === DICE BADGE === */
.dice-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:16px;font-size:.85rem;font-weight:700}
.dice-great{background:rgba(34,197,94,.15);color:var(--green)}
.dice-good{background:rgba(74,144,217,.15);color:var(--accent)}
.dice-moderate{background:rgba(138,138,154,.15);color:var(--text-dim)}
.dice-poor{background:rgba(245,158,11,.15);color:var(--orange)}
.dice-critical{background:rgba(239,68,68,.15);color:var(--red)}

/* === CHART === */
.chart{display:flex;align-items:flex-end;gap:3px;height:80px;padding:8px 0}
.chart-bar{flex:1;min-width:6px;background:linear-gradient(180deg,var(--accent),var(--accent-dim));border-radius:3px 3px 0 0;transition:height .4s ease}
.chart-bar.current{background:linear-gradient(180deg,var(--gold),var(--orange))}

/* === TERM (JARGON TOOLTIP) === */
.term{text-decoration:underline dotted;text-underline-offset:3px;color:var(--accent);cursor:help}

/* === TOOLTIP OVERLAY === */
.tooltip-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
.tooltip-card{background:var(--bg-elevated);border:1px solid var(--border-bright);border-radius:16px;padding:24px;max-width:360px;width:100%}

/* === COLLAPSIBLE === */
.collapse-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:12px 0}
.collapse-content{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapse-content.open{max-height:2000px}
.collapse-arrow{transition:transform .3s ease}
.collapse-arrow.open{transform:rotate(180deg)}

/* === STICKY === */
.header-sticky{position:sticky;top:0;z-index:50;background:var(--bg);padding:12px 16px;border-bottom:1px solid var(--border)}
.footer-sticky{position:sticky;bottom:0;z-index:50;background:var(--bg);padding:12px 16px;border-top:1px solid var(--border)}

/* === DICE ANIMATION === */
@keyframes dice-shake{0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(-15deg) scale(1.1)}50%{transform:rotate(10deg) scale(.95)}75%{transform:rotate(-5deg) scale(1.05)}}
.dice-rolling{animation:dice-shake .15s infinite;display:inline-block}
.dice-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.dice-skip{position:absolute;top:16px;right:16px;font-size:1.5rem;opacity:.6;cursor:pointer;background:none;border:none;color:var(--text)}

/* === ANIMATIONS === */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:flex .2s ease}
.slide-up{animation:slideUp .3s ease}

/* === MISC === */
.balance-sheet{display:grid;grid-template-columns:1fr auto;gap:8px 16px;padding:4px 0}
.balance-sheet .label{color:var(--text-dim)}
.balance-sheet .value{text-align:right;font-weight:600}
.balance-sheet .total{border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.balance-sheet .total .label{color:var(--gold);font-weight:700}
.balance-sheet .total .value{color:var(--gold);font-weight:700;font-size:1.1rem}
.event-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.event-card .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.event-card .header .left{display:flex;align-items:center;gap:8px;font-weight:600}
.event-card .text{font-size:.9rem;color:var(--text-dim);line-height:1.5}
.event-card .tip{font-size:.8rem;color:var(--text-faint);margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)}
.setup-input{width:100%;font-size:1.5rem;text-align:center;padding:16px;background:var(--bg-elevated);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit}
.setup-input:focus{border-color:var(--accent);outline:none}
.quick-select{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.quick-btn{flex:1;min-width:80px;min-height:44px;padding:10px;border:1px solid var(--border);border-radius:24px;background:var(--bg-elevated);color:var(--text);font-size:.85rem;cursor:pointer;transition:all .15s}
.quick-btn:active{transform:scale(.95);border-color:var(--accent)}
.setup-info{text-align:center;color:var(--text-faint);font-size:.85rem;margin-top:16px}
.backstory{font-style:italic;text-align:center;color:var(--text-dim);padding:20px 16px;font-size:.9rem;line-height:1.8}
.share-card{background:var(--bg-elevated);border:1px solid var(--border-bright);border-radius:12px;padding:16px;margin:16px 0;white-space:pre-wrap;font-size:.9rem;color:var(--text-dim)}
.share-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--accent);border:none;border-radius:24px;color:#fff;font-size:.95rem;font-weight:600;cursor:pointer}
.share-btn:active{transform:scale(.97)}
.glossary-search{width:100%;padding:12px 16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:1rem;margin-bottom:12px}
.glossary-search:focus{border-color:var(--accent);outline:none}
.glossary-item{padding:12px 0;border-bottom:1px solid var(--border)}
.glossary-item .term-name{font-weight:600;color:var(--accent)}
.glossary-item .term-short{color:var(--text-dim);font-size:.85rem;margin-top:2px}
.glossary-item .term-desc{font-size:.85rem;color:var(--text-dim);margin-top:8px;display:none}
.glossary-item.expanded .term-desc{display:block}
.glossary-item .term-example{font-size:.8rem;color:var(--text-faint);margin-top:6px;font-style:italic}
.float-btn{position:fixed;bottom:16px;right:16px;z-index:40;width:48px;height:48px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.float-btn:active{transform:scale(.9)}
.replay-prompt{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;margin:12px 0}
.replay-prompt ul{list-style:none;padding:0;margin:8px 0}
.replay-prompt li{padding:4px 0;font-size:.85rem;color:var(--text-dim)}
.rank-badge{font-size:3rem;text-align:center;margin:16px 0}
.rank-name{text-align:center;font-size:1.2rem;font-weight:700;color:var(--gold)}
.rank-desc{text-align:center;color:var(--text-dim);font-size:.9rem;margin-bottom:16px}
.final-amount{text-align:center;font-size:2.5rem;font-weight:800;color:var(--gold);margin:8px 0}
.final-sub{text-align:center;color:var(--text-dim);font-size:1rem;margin-bottom:16px}
.highlight-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.highlight-card .hl-title{font-size:.8rem;color:var(--text-faint)}
.highlight-card .hl-value{font-size:1.1rem;font-weight:600;color:var(--text);margin-top:2px}
.scroll-hint{text-align:center;color:var(--text-faint);font-size:.8rem;padding:8px}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

// === 1. CONSTANTS & GLOSSARY ===
const GAME = { goal: 200000, maxYears: 10, minCapital: 100, saveVersion: 1 };

const GLOSSARY = {
  'MRR': { term: 'MRR (Monthly Recurring Revenue)', short: '월간 반복 수익', desc: '매월 고정으로 들어오는 수익. 구독형 서비스(SaaS)에서 고객이 매월 내는 돈의 합계.', example: '유료 50명 × 월 2만엔 = MRR 100만엔' },
  'ARR': { term: 'ARR (Annual Recurring Revenue)', short: '연간 반복 수익', desc: 'MRR × 12. 투자자가 사업 가치를 평가할 때 가장 중요하게 보는 지표.', example: 'MRR 100만 × 12 = ARR 1,200만엔' },
  'LTV': { term: 'LTV (Loan to Value)', short: '담보대출 비율', desc: '부동산 감정가격 대비 대출 금액의 비율. 80%면 자기돈 20%로 매물을 살 수 있다는 뜻.', example: '1,800만엔 매물에 1,440만엔 대출 = LTV 80%' },
  'CF': { term: 'CF (Cash Flow)', short: '현금 흐름', desc: '들어오는 돈(월세)에서 나가는 돈(관리비, 이자, 수리비)을 뺀 순수 현금.', example: '월세 9.5만 - 관리비 2만 - 이자 1만 = CF +6.5만엔' },
  'Series A': { term: 'Series A (시리즈A)', short: '1차 본격 투자', desc: '사업이 성장한 후 받는 첫 번째 큰 투자. 보통 1~3억엔을 받고 지분 15~30%를 양보.', example: '1.5억엔 투자, 지분 25% 양보 → 회사 가치 6억엔' },
  'Exit': { term: 'Exit (엑시트)', short: '사업 매각/상장', desc: '창업자가 회사 지분을 팔아 현금을 회수하는 것. M&A 매각 또는 IPO 상장.', example: '회사를 10억엔에 매각 → 내 지분 75% = 7.5억엔' },
  'Refinance': { term: 'Refinance (리파이낸스)', short: '대출 갈아타기', desc: '기존 대출을 새 조건의 대출로 바꾸는 것. 부동산 가치가 오르면 감정가를 높여 더 많이 빌릴 수 있음.', example: '대출 1,600만 → 감정가 상향 → 새 대출 1,785만 → 185만엔 회수' },
  'Equity': { term: 'Equity (에퀴티)', short: '순자산', desc: '부동산의 "내 돈" 부분. 시장가격에서 대출 잔액을 뺀 금액.', example: '2,000만엔 매물 - 1,600만엔 대출 = equity 400만엔' },
  'PropTech': { term: 'PropTech (프롭테크)', short: '부동산 + 기술', desc: 'Property + Technology. 부동산 업무를 IT로 효율화하는 사업.', example: '리노베이션 관리 앱 → 본인 매물 가치 +10% → 유저 확보' },
  'CAC': { term: 'CAC (Customer Acquisition Cost)', short: '고객 1명 확보 비용', desc: '신규 유료 고객 1명을 데려오는데 드는 마케팅 비용.', example: '월 5만엔 광고 → 2명 가입 = CAC 2.5만엔' },
  'Bootstrap': { term: 'Bootstrap (부트스트랩)', short: '자력 성장', desc: '외부 투자 없이 자기 자본과 매출로만 사업을 키우는 방식.', example: 'VC 안 받고 MRR을 키우며 자력으로 성장' },
  'VC': { term: 'VC (Venture Capital)', short: '벤처 투자사', desc: '성장 가능성이 높은 스타트업에 투자하는 전문 투자 회사.', example: 'VC 1.5억엔 투자 → 지분 25% + 이사석 1석' },
  'IPO': { term: 'IPO (기업공개)', short: '주식 상장', desc: '회사를 주식시장에 상장해서 누구나 주식을 살 수 있게 하는 것.', example: '상장 시 내 지분 가치 = 시가총액 × 지분율' },
  'M&A': { term: 'M&A (인수합병)', short: '회사 매수/매각', desc: '다른 회사가 내 회사를 사가는 것(매각) 또는 내가 다른 회사를 사는 것(매수).', example: 'Z Holdings가 내 회사를 10억엔에 인수' },
  'Multiplier': { term: 'Multiplier (배수)', short: '사업 가치 배수', desc: 'ARR의 몇 배를 사업 가치로 볼지 나타내는 숫자. 성장 중인 SaaS는 5~10배.', example: 'ARR 5,400만 × 배수 6 = 사업 가치 3.24억엔' },
  'PoC': { term: 'PoC (Proof of Concept)', short: '사례 증명', desc: '아이디어가 실제로 효과가 있다는 것을 보여주는 증거.', example: '본인 매물 가치 +10% → "이 서비스 효과 있습니다"' },
  'Pivot': { term: 'Pivot (피벗)', short: '방향 전환', desc: '사업의 핵심 방향을 바꾸는 것. 원래 제품이 안 풀릴 때 다른 시장이나 기능으로 전환.', example: 'AI 에이전트 → 부동산 관리 서비스로 피벗' },
};

const TOKYO_AREAS = [
  { name: 'Meguro', basePrice: [1700, 2200], rentRate: [0.045, 0.060] },
  { name: 'Shinagawa', basePrice: [1800, 2400], rentRate: [0.045, 0.058] },
  { name: 'Ebisu', basePrice: [1900, 2500], rentRate: [0.048, 0.062] },
  { name: 'Shibuya', basePrice: [2000, 2800], rentRate: [0.050, 0.065] },
  { name: 'Setagaya', basePrice: [1500, 2100], rentRate: [0.042, 0.055] },
  { name: 'Nakano', basePrice: [1400, 1900], rentRate: [0.045, 0.058] },
  { name: 'Koto', basePrice: [1600, 2100], rentRate: [0.046, 0.056] },
  { name: 'Adachi', basePrice: [1200, 1700], rentRate: [0.050, 0.065] },
];

// === 2. GAME STATE FACTORY ===
let game;

function createInitialState() {
  return {
    startCapital: 0, goal: 200000, duration: 10, strategy: '',
    year: 0, cash: 0, realEstate: [],
    stocks: { qqq: 0, crypto: 0, qqqCost: 0, cryptoCost: 0 },
    business: { mrr: 0, users: 0, value: 0, cash: 0, stake: 1.0, employees: 0, active: false, competitor: false, growthPenalty: 1.0, marketingBoost: false, devBoost: false, pivotDone: false },
    proptech: { mrr: 0, users: 0, value: 0, active: false, propertyBoost: 0, marketingBoost: false },
    emergency: 0, history: [], log: [],
    gameOver: false, seriesA: false, seriesB: false, expandedTo: null, exited: false,
    pendingEvents: [], saveVersion: 1,
  };
}

// === 3. DICE & RNG UTILITIES ===
function rollD20() { return Math.floor(Math.random() * 20) + 1; }
function randomBetween(min, max) { return Math.random() * (max - min) + min; }
function randomFromArray(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function rollOutcome(roll, bonus) {
  bonus = bonus || 0;
  const effective = Math.max(1, Math.min(20, roll + bonus));
  let tier, label, multiplier;
  if (effective >= 17) { tier = 'great'; label = '대성공 🔥'; multiplier = randomBetween(2.0, 2.5); }
  else if (effective >= 13) { tier = 'good'; label = '성공 📈'; multiplier = randomBetween(1.3, 1.5); }
  else if (effective >= 8) { tier = 'moderate'; label = '보통 📊'; multiplier = randomBetween(0.9, 1.1); }
  else if (effective >= 4) { tier = 'poor'; label = '부진 😓'; multiplier = randomBetween(0.5, 0.7); }
  else { tier = 'critical'; label = '위기 😱'; multiplier = randomBetween(0.1, 0.3); }
  return { tier: tier, label: label, multiplier: multiplier, effectiveRoll: effective };
}

// === 4. FORMAT HELPERS ===
function formatYen(wan) {
  if (wan >= 10000) return (wan / 10000).toFixed(1).replace(/\.0$/, '') + '億円';
  return Math.round(wan).toLocaleString() + '万円';
}
function formatPercent(num) { return (num >= 0 ? '+' : '') + (Math.round(num * 1000) / 10) + '%'; }

function processEventText(text) {
  return text.replace(/\[term:([^\]]+)\]/g, function(m, key) {
    return '<span class="term" data-term="' + key + '">' + key + '</span>';
  });
}

// === 5. EVENT SCENARIO LIBRARY ===
const EVENTS = {
  re_01: { trigger: function(s) { return s.realEstate.length > 0; }, weight: 20,
    flavor: function(s) { var c = randomBetween(-0.03, 0.12); var d = c >= 0 ? '상승' : '하락';
      return { title: '부동산 시장 ' + d, text: '도쿄 부동산 시장이 ' + formatPercent(c) + ' ' + d + '했습니다.',
        apply: function(s) { s.realEstate.forEach(function(p) { p.valueChange += c; }); } }; } },
  re_02: { trigger: function(s) { return s.realEstate.length > 0; }, weight: 15,
    flavor: function(s) { var vm = Math.floor(randomBetween(1, 4)); var p = s.realEstate[Math.floor(Math.random() * s.realEstate.length)];
      return { title: p.area + ' 공실 발생', text: p.area + '의 ' + p.type + '이 ' + vm + '개월 공실되었습니다.',
        apply: function(s) { p.occupiedMonths = 12 - vm; } }; } },
  re_03: { trigger: function(s) { return s.cash >= 200; }, weight: 10,
    flavor: function(s) { return { title: '매수 기회', text: randomFromArray(TOKYO_AREAS).name + '에 좋은 조건의 1K 매물이 나왔습니다.',
      apply: function(s) {} }; } },
  sc_02: { trigger: function(s) { return s.stocks.crypto > 0; }, weight: 20,
    flavor: function(s) { var c = randomBetween(-0.20, 1.50); var up = c >= 0;
      return { title: up ? '암호자산 폭등! 🚀' : '암호자산 급락 💀', text: 'BTC/알트코인 시장이 ' + formatPercent(c) + ' 변동.',

function pickRandomEvent(category, state) {
  var prefix = { re: 're_', sc: 'sc_', bz: 'bz_', pt: 'pt_', lf: 'lf_' }[category] || '';
  var candidates = [];
  var keys = Object.keys(EVENTS);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    if (k.startsWith(prefix) && EVENTS[k].trigger(state)) candidates.push(EVENTS[k]);
  }
  if (candidates.length === 0) return null;
  var tw = candidates.reduce(function(sum, e) { return sum + (e.weight || 10); }, 0);
  var r = Math.random() * tw;
  for (var j = 0; j < candidates.length; j++) { r -= (candidates[j].weight || 10); if (r <= 0) return candidates[j]; }
  return candidates[0];
}

  var ltv = randomBetween(0.75, 0.85);
  var loan = Math.round(price * ltv / 10) * 10;
  var downPayment = price - loan;
  var rr = randomBetween(area.rentRate[0], area.rentRate[1]);
  var mr = Math.round(price * rr / 12 * 10) / 10;
  var mf = mr * 0.15;
  var mi = (loan * 0.0075) / 12;
  var cf = Math.round((mr - mf - mi) * 10) / 10;
  return { area: area.name, type: '1K', size: Math.round(randomBetween(22, 32)), purchasePrice: price, loan: loan, loanRate: 0.0075, rent: mr, monthlyCF: cf, downPayment: downPayment, propTechApplied: false, valueChange: 0, occupiedMonths: 12 };

function calcMacro(state) {
  var roll = rollD20(); var bonus = 0, label = '안정', affects = 'all';
  if (roll >= 17) { bonus = 3; label = 'AI 붐 가속 🤖'; affects = 'business'; }
  else if (roll >= 13) { bonus = 2; label = '시장 호황 📈'; }
  else if (roll >= 8) { bonus = 0; label = '안정'; }
  else if (roll >= 4) { bonus = -2; label = '경제 둔화 😓'; }
  else { bonus = -3; label = '금융 위기 😱'; }
  var rr = rollD20(); if (rr >= 17) { bonus += 2; label += ' + 부동산 버블 🏢'; }
  return { bonus: bonus, label: label, affects: affects };
}

function calcRealEstate(state, roll, marketBonus) {
  var outcome = rollOutcome(roll, marketBonus); var events = [];
  state.realEstate.forEach(function(prop, i) {
    var mc = randomBetween(-0.03, 0.10) * outcome.multiplier;
    var pc = mc + (prop.propTechApplied ? state.proptech.propertyBoost : 0);
    prop.valueChange += pc;
    if (outcome.tier === 'critical') prop.occupiedMonths = Math.max(6, prop.occupiedMonths - 3);
    else if (outcome.tier === 'poor') prop.occupiedMonths = Math.max(8, prop.occupiedMonths - 2);
    else if (outcome.tier === 'moderate') prop.occupiedMonths = Math.max(10, prop.occupiedMonths - 1);
    else prop.occupiedMonths = 12;
    var cf = prop.monthlyCF * prop.occupiedMonths; state.cash += cf;
    events.push({ area: 'real_estate', emoji: '🏢', roll: outcome.effectiveRoll, tier: outcome.tier, label: outcome.label,
      title: prop.area + ' ' + prop.type, text: '자산가치 ' + formatPercent(pc) + '. ' + (prop.occupiedMonths < 12 ? (12 - prop.occupiedMonths) + '개월 공실. ' : '') + '연 CF +' + formatYen(cf) });
  });
  return events;
}

function calcStocks(state, roll, marketBonus) {
  var outcome = rollOutcome(roll, marketBonus); var events = [];
  if (state.stocks.qqq > 0) {

    state.stocks.qqq = Math.round(state.stocks.qqq * (1 + qr));
    events.push({ area: 'stocks', emoji: '📊', roll: outcome.effectiveRoll, tier: outcome.tier, label: outcome.label,
      title: 'QQQ (나스닥)', text: 'QQQ ' + formatPercent(qr) + ' → ' + formatYen(state.stocks.qqq) });
  }
  if (state.stocks.crypto > 0) {
    var cb = randomBetween(-0.60, 2.00);
    var cr = cb * outcome.multiplier + (marketBonus * 0.1);
    state.stocks.crypto = Math.max(0, Math.round(state.stocks.crypto * (1 + cr)));
    events.push({ area: 'crypto', emoji: '💎', roll: outcome.effectiveRoll, tier: outcome.tier, label: outcome.label,
      title: '암호자산', text: '암호 ' + formatPercent(cr) + ' → ' + formatYen(state.stocks.crypto) });
  }
  return events;
}

function calcBusiness(state, roll, marketBonus) {
  var outcome = rollOutcome(roll, marketBonus); var b = state.business; var events = [];
  if (!b.active) return events;
  var bg = randomBetween(0.10, 0.30) * outcome.multiplier;
  var eg = bg * b.growthPenalty;
  var mm = b.marketingBoost ? 1.5 : 1.0;
  var dm = b.devBoost ? 1.3 : 1.0;
  // If 0 users, seed with initial users based on roll (2-20)
  if (b.users === 0) {
    var seedUsers = Math.max(1, Math.round(outcome.multiplier * (outcome.tier === 'great' ? 15 : outcome.tier === 'good' ? 8 : 3)));
    b.users = seedUsers;
    b.mrr = seedUsers * 2; // 2万/user initial
    var nu = seedUsers;
  } else {
    var nu = Math.round(b.users * eg * mm); b.users += nu;
  }
  var ar = b.users > 0 ? b.mrr / Math.max(1, b.users - nu) : 2;
  b.mrr += Math.round(nu * ar * dm);
  var mp = 4;
  if (outcome.tier === 'great') mp = 8; else if (outcome.tier === 'good') mp = 6;
  else if (outcome.tier === 'moderate') mp = 4; else mp = 3;
  if (state.seriesA) mp += 2; if (state.expandedTo) mp += 1;
  b.value = Math.round(b.mrr * 12 * mp);
  var sc = b.employees * 400; var ic = 200 + b.users * 0.5; var mc = b.marketingBoost ? 300 : 0;
  var tc = sc + ic + mc; var rev = b.mrr * 12; var net = rev - tc; b.cash += net;
  events.push({ area: 'business', emoji: '💼', roll: outcome.effectiveRoll, tier: outcome.tier, label: outcome.label,
    title: 'SaaS 사업', text: '유료 ' + b.users + '명 (+' + nu + '). [term:MRR] ' + formatYen(b.mrr) + '/월. 사업가치 ' + formatYen(b.value) + '. ' + (net >= 0 ? '흑자 +' + formatYen(net) : '적자 ' + formatYen(net)) });
  if (Math.random() < 0.25) {
    var ev = pickRandomEvent('bz', state);
    if (ev) { var r = ev.flavor(state); r.apply(state); events.push({ area: 'business_event', emoji: '⚡', title: r.title, text: r.text }); }
  }
  return events;
}

function calcPropTech(state, roll, marketBonus) {
  var outcome = rollOutcome(roll, marketBonus); var p = state.proptech; var events = [];
  if (!p.active) return events;
  var g = randomBetween(0.15, 0.40) * outcome.multiplier;
  var nu = Math.round(p.users * g); p.users += nu; var ar = 5; p.mrr += nu * ar;
  p.propertyBoost = Math.min(0.25, p.propertyBoost + randomBetween(0.01, 0.05) * outcome.multiplier);
  state.realEstate.forEach(function(prop) { prop.propTechApplied = true; });
  p.value = Math.round(p.mrr * 12 * 3);
  events.push({ area: 'proptech', emoji: '🏗️', roll: outcome.effectiveRoll, tier: outcome.tier, label: outcome.label,
    title: '[term:PropTech]', text: '유저 ' + p.users + '명 (+' + nu + '). [term:MRR] ' + formatYen(p.mrr) + '/월. 매물 가치 +' + formatPercent(p.propertyBoost) });
  return events;
}

function calcTotalAssets(state) {
  var reEq = state.realEstate.reduce(function(sum, p) { return sum + (Math.round(p.purchasePrice * (1 + p.valueChange)) - p.loan); }, 0);
  var reCF = state.realEstate.reduce(function(sum, p) { return sum + p.monthlyCF * p.occupiedMonths; }, 0);
  var st = state.stocks.qqq + state.stocks.crypto;
  var bv = Math.round(state.business.value * state.business.stake);
  var bc = state.business.cash > 0 ? Math.round(state.business.cash * state.business.stake) : 0;
  var pv = state.proptech.value;
  return Math.round(reEq + reCF + st + bv + bc + pv + state.cash + state.emergency);
}

function processYear(state, decision) {
  decision.action(state);
  var macro = calcMacro(state);
  var events = [];
  var allEvents = [];
  if (state.realEstate.length > 0) { var reEv = calcRealEstate(state, rollD20(), macro.bonus); events = events.concat(reEv); }
  if (state.stocks.qqq > 0 || state.stocks.crypto > 0) { var stEv = calcStocks(state, rollD20(), macro.bonus); events = events.concat(stEv); }
  if (state.business.active) { var bzEv = calcBusiness(state, rollD20(), macro.bonus); events = events.concat(bzEv); }
  if (state.proptech.active) { var ptEv = calcPropTech(state, rollD20(), macro.bonus); events = events.concat(ptEv); }
  if (Math.random() < 0.30) { var le = pickRandomEvent('lf', state); if (le) { var lr = le.flavor(state); lr.apply(state); events.push({ area: 'life_event', emoji: '🎲', title: lr.title, text: lr.text }); } }
  var total = calcTotalAssets(state);
  var earlyEnd = null;
  if (total >= state.goal) earlyEnd = 'goal';
  else if (total <= 0 && state.cash < 0 && state.realEstate.length === 0 && state.stocks.qqq + state.stocks.crypto === 0 && (!state.business.active || state.business.value === 0) && state.emergency === 0) earlyEnd = 'bankruptcy';
  state.history.push({ year: state.year, totalAssets: total });
  return { events: events, macro: macro, total: total, earlyEnd: earlyEnd };
}

// === 9. TAX & EXIT CALCULATOR ===
function processExit(state) {
  var breakdown = {};
  // Business sale
  if (state.business.active && state.business.value > 0) {
    var sv = Math.round(state.business.value * state.business.stake);
    var bt = Math.round(sv * 0.20);
    breakdown.business = sv - bt;
  }
  // Real estate
  var reTotal = 0;
  state.realEstate.forEach(function(p) {
    var cv = Math.round(p.purchasePrice * (1 + p.valueChange));
    var gain = Math.max(0, cv - p.purchasePrice);
    var tx = Math.round(gain * 0.15);
    reTotal += (cv - p.loan - tx);
  });
  breakdown.realEstate = reTotal;
  // Stocks
  var qGain = Math.max(0, state.stocks.qqq - state.stocks.qqqCost);
  var qTx = Math.round(qGain * 0.20315);
  breakdown.qqq = state.stocks.qqq - qTx;
  var cGain = Math.max(0, state.stocks.crypto - state.stocks.cryptoCost);
  var cTx = Math.round(cGain * 0.20315);
  breakdown.crypto = state.stocks.crypto - cTx;
  // Cash + emergency (no tax)
  breakdown.cash = state.cash + state.emergency;
  // Business cash (dividend 20%)
  if (state.business.cash > 0) {
    var dct = Math.round(state.business.cash * 0.20);
    breakdown.businessCash = state.business.cash - dct;
  } else breakdown.businessCash = 0;
  // PropTech
  if (state.proptech.active && state.proptech.value > 0) {
    var ptv = state.proptech.value; var ptt = Math.round(ptv * 0.20);
    breakdown.proptech = ptv - ptt;
  } else breakdown.proptech = 0;
  var total = 0;
  var keys = Object.keys(breakdown);
  for (var i = 0; i < keys.length; i++) total += breakdown[keys[i]];
  return { breakdown: breakdown, totalAfterTax: Math.round(total) };
}

function getRank(total) {
  if (total >= 200000) return { emoji: '🥇', name: 'Gold', desc: '20億円 達成! 꿈을 이뤘습니다!' };

  if (total >= 50000) return { emoji: '🥉', name: 'Bronze', desc: '5億円 달성!' };
  if (total >= 10000) return { emoji: '🏅', name: 'Iron', desc: '1億円 달성!' };
  return { emoji: '💧', name: 'Participation', desc: '처음부터 다시!' };
}

  // Share
  html += '<div class="share-card">' + shareText + '</div>';
  html += '<div style="display:flex;gap:8px;margin-bottom:16px"><button class="share-btn" data-action="copy-share" data-text="' + shareText.replace(/"/g, '&quot;').replace(/\n/g, '&#10;') + '">📋 복사</button>';
  html += '<button class="share-btn" data-action="native-share" data-text="' + shareText.replace(/"/g, '&quot;').replace(/\n/g, '&#10;') + '">📤 공유</button></div>';
  // Replay prompt
  html += '<div class="replay-prompt"><div style="font-weight:600;margin-bottom:8px">💡 다른 전략으로 도전해보세요!</div><ul>';
  html += '<li>• 창업 올인 → 더 빠른 성장?</li><li>• 부동산 올인 → 더 안정적?</li><li>• 암호 올인 → 하이리스크?</li></ul></div>';
  html += '<button class="btn btn-primary" data-action="replay">다시 플레이</button>';
  html += '</div>';
  app.innerHTML = html;
  saveLocalStats(total >= game.goal);
  localStorage.removeItem('richman-save');
}

function renderGlossary() {
  var keys = Object.keys(GLOSSARY);
  var html = '<div class="tooltip-overlay" id="glossary-overlay"><div class="tooltip-card" style="max-width:400px;max-height:80vh;overflow-y:auto"><div style="font-weight:600;font-size:1.1rem;margin-bottom:12px">📖 용어 사전</div>';
  html += '<input class="glossary-search" id="glossary-search" placeholder="검색..." data-action="glossary-search">';
  keys.forEach(function(k) {
    var g = GLOSSARY[k];
    html += '<div class="glossary-item" data-term-key="' + k + '"><div class="term-name">' + g.term + '</div><div class="term-short">' + g.short + '</div><div class="term-desc">' + g.desc + '</div><div class="term-example">예) ' + g.example + '</div></div>';
  });
  html += '<button class="btn" style="margin-top:16px" data-action="close-glossary">닫기</button></div></div>';
  var existing = document.getElementById('glossary-overlay');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  // Wire up glossary item click
  document.querySelectorAll('.glossary-item').forEach(function(item) {
    item.addEventListener('click', function() { item.classList.toggle('expanded'); });
  });
  var search = document.getElementById('glossary-search');
  if (search) {
    search.addEventListener('input', function(e) {
      var q = e.target.value.toLowerCase();
      document.querySelectorAll('.glossary-item').forEach(function(item) {
        var text = item.textContent.toLowerCase();
        item.style.display = text.indexOf(q) > -1 ? '' : 'none';
      });
    });
  }
}

function showTooltip(termKey) {
  var g = GLOSSARY[termKey];
  if (!g) return;
  var html = '<div class="tooltip-overlay" id="term-tooltip"><div class="tooltip-card"><div style="font-weight:600;font-size:1rem;color:var(--accent);margin-bottom:4px">📖 ' + g.term + '</div><div style="color:var(--text-dim);font-size:.85rem;margin-bottom:12px">' + g.short + '</div><div style="font-size:.9rem;line-height:1.6;margin-bottom:12px">' + g.desc + '</div><div style="font-size:.8rem;color:var(--text-faint);font-style:italic;margin-bottom:16px">예) ' + g.example + '</div><button class="btn" data-action="close-tooltip">닫기</button></div></div>';
  var existing = document.getElementById('term-tooltip');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('term-tooltip').addEventListener('click', function(e) {
    if (e.target === this || e.target.getAttribute('data-action') === 'close-tooltip') this.remove();
  });
}

// === 11. SCREEN NAVIGATION & TRANSITIONS ===
function startGame() {
  game = createInitialState();
  game.cash = game.startCapital;
  game.year = 1;
  saveGame();
  renderDecisionScreen();
}

function selectDecision(optId) {
  var dec = currentDecisions.find(function(d) { return d.id === optId; });
  if (!dec) return;
  if (dec.id === 'exit_sell_all') {
    game.exited = true; game.gameOver = true;
    renderEndScreen();
    return;
  }
  animateDiceRoll(function() {
    var result = processYear(game, dec);
    saveGame();
    renderYearResults(result);
  });
}

function nextYear() {
  if (game.year >= game.duration) {
    renderEndScreen();
    return;
  }
  game.year++;
  // Reset occupiedMonths for new year
  game.realEstate.forEach(function(p) { p.occupiedMonths = 12; });
  saveGame();
  renderDecisionScreen();
}

// === 12. LOCALSTORAGE SAVE/LOAD + STATS ===
function saveGame() {
  try {
    localStorage.setItem('richman-save', JSON.stringify({ version: GAME.saveVersion, savedAt: new Date().toISOString(), state: game }));
  } catch (e) {}
}

function loadGame() {
  try {
    var data = JSON.parse(localStorage.getItem('richman-save'));
    if (!data || data.version !== GAME.saveVersion || !data.state) return null;
    return data.state;
  } catch (e) { return null; }
}

function hasSave() {
  return !!loadGame();
}

function resumeGame() {
  var s = loadGame();
  if (s) { game = s; renderDecisionScreen(); }
}

function getLocalStats() {
  try {
    return JSON.parse(localStorage.getItem('richman-stats')) || { games: 0, wins: 0, strategies: {} };
  } catch (e) { return { games: 0, wins: 0, strategies: {} }; }
}

function saveLocalStats(won) {
  var stats = getLocalStats();
  stats.games++;
  if (won) stats.wins++;
  var strat = game.strategy || '';
  stats.strategies[strat] = (stats.strategies[strat] || 0) + 1;
  try { localStorage.setItem('richman-stats', JSON.stringify(stats)); } catch (e) {}
}

// === 13. EVENT DELEGATION ===
app.addEventListener('click', function(e) {
  var el = e.target;
  var actionEl = el.closest('[data-action]');
  if (!actionEl) {
    // Check for term click
    var termEl = el.closest('[data-term]');
    if (termEl) { showTooltip(termEl.getAttribute('data-term')); }
    return;
  }
  var action = actionEl.getAttribute('data-action');
  switch (action) {
    case 'start':
      setupStep = 0;
      renderSetup(0);
      break;
    case 'resume':
      resumeGame();
      break;
    case 'glossary':
      renderGlossary();
      break;
    case 'close-glossary':
      var go = document.getElementById('glossary-overlay');
      if (go) go.remove();
      break;
    case 'close-tooltip':
      var tt = document.getElementById('term-tooltip');
      if (tt) tt.remove();
      break;
    case 'quick-capital':
      var v = parseInt(actionEl.getAttribute('data-value'));
      game = createInitialState();
      game.startCapital = v;
      game.cash = v;
      setupStep = 1;
      renderSetup(1);
      break;
    case 'next-capital':
      var input = document.getElementById('capital-input');
      var cv = parseInt(input.value);
      if (cv < 100 || isNaN(cv)) { input.style.borderColor = 'var(--red)'; return; }
      game = createInitialState();
      game.startCapital = cv;
      game.cash = cv;
      setupStep = 1;
      renderSetup(1);
      break;
    case 'select-duration':
      game.duration = parseInt(actionEl.getAttribute('data-value'));
      setupStep = 2;
      renderSetup(2);
      break;
    case 'select-strategy':
      game.strategy = actionEl.getAttribute('data-value');
      startGame();
      break;
    case 'decision':
      selectDecision(actionEl.getAttribute('data-id'));
      break;
    case 'next-year':
      nextYear();
      break;
    case 'end-game':
      renderEndScreen();
      break;
    case 'continue-game':
      var ov = document.getElementById('goal-overlay');
      if (ov) ov.remove();
      break;
    case 'toggle-collapse':
      var targetId = actionEl.getAttribute('data-target');
      var target = document.getElementById(targetId);
      var arrow = actionEl.querySelector('.collapse-arrow');
      if (target) {
        if (target.classList.contains('open')) { target.classList.remove('open'); arrow.classList.remove('open'); }
        else { target.classList.add('open'); arrow.classList.add('open'); }
      }
      break;
    case 'copy-share':
      var text = actionEl.getAttribute('data-text').replace(/&#10;/g, '\n').replace(/&quot;/g, '"');
      navigator.clipboard.writeText(text).then(function() { actionEl.textContent = '✅ 복사됨!'; });
      break;
    case 'native-share':
      var text2 = actionEl.getAttribute('data-text').replace(/&#10;/g, '\n').replace(/&quot;/g, '"');
      if (navigator.share) { navigator.share({ title: '20億円の夢', text: text2 }); }
      else { navigator.clipboard.writeText(text2).then(function() { actionEl.textContent = '✅ 복사됨!'; }); }
      break;
    case 'replay':
      game = null;
      localStorage.removeItem('richman-save');
      renderTitle();
      break;
    case 'skip-dice':
      // handled by overlay click
      break;
  }
});

// === 14. INIT ===
renderTitle();

</script>
