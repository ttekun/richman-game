<style>
/* === RESET & BASE === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  line-height:1.6;min-height:100vh;
  overflow-x:hidden;-webkit-tap-highlight-color:transparent;
}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}

/* === CSS VARIABLES === */
:root{
  --bg:#0a0a12;--bg-card:#14142a;--bg-elevated:#1e1e38;
  --accent:#4a90d9;--accent-dim:#2a5070;
  --gold:#f0c040;--green:#22c55e;--green-dim:#16a34a;
  --red:#ef4444;--red-dim:#b91c1c;--orange:#f59e0b;
  --text:#f0f0f0;--text-dim:#8a8a9a;--text-faint:#555568;
  --border:#2a2a3e;--border-bright:#3a3a52;
}

/* === COMPONENTS === */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:48px;padding:14px 24px;border:none;border-radius:12px;
  font-size:1rem;font-weight:600;color:var(--text);cursor:pointer;
  background:var(--bg-elevated);border:1px solid var(--border);
  transition:all .15s ease;width:100%;
}
.btn:active{transform:scale(.97);border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:active{background:var(--accent-dim)}
.btn-decision{
  width:100%;min-height:72px;padding:16px;
  background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:12px;color:var(--text);text-align:left;cursor:pointer;
  transition:all .15s ease;font-family:inherit;
}
.btn-decision:active{transform:scale(.98);border-color:var(--accent)}
.btn-decision .title{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:8px}
.btn-decision .desc{font-size:.85rem;color:var(--text-dim);margin-top:4px}
.btn-decision .tag{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:8px;background:var(--bg-card);color:var(--text-dim);margin-top:6px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* === PROGRESS BAR === */
.progress-bar{height:8px;background:var(--bg-elevated);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:4px;transition:width .6s ease}

/* === DICE BADGE === */
.dice-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:16px;font-size:.85rem;font-weight:700}
.dice-great{background:rgba(34,197,94,.15);color:var(--green)}
.dice-good{background:rgba(74,144,217,.15);color:var(--accent)}
.dice-moderate{background:rgba(138,138,154,.15);color:var(--text-dim)}
.dice-poor{background:rgba(245,158,11,.15);color:var(--orange)}
.dice-critical{background:rgba(239,68,68,.15);color:var(--red)}

/* === CHART === */
.chart{display:flex;align-items:flex-end;gap:3px;height:80px;padding:8px 0}
.chart-bar{flex:1;min-width:6px;background:linear-gradient(180deg,var(--accent),var(--accent-dim));border-radius:3px 3px 0 0;transition:height .4s ease}
.chart-bar.current{background:linear-gradient(180deg,var(--gold),var(--orange))}

/* === TERM (JARGON TOOLTIP) === */
.term{text-decoration:underline dotted;text-underline-offset:3px;color:var(--accent);cursor:help}

/* === TOOLTIP OVERLAY === */
.tooltip-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
.tooltip-card{background:var(--bg-elevated);border:1px solid var(--border-bright);border-radius:16px;padding:24px;max-width:360px;width:100%}

/* === COLLAPSIBLE === */
.collapse-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:12px 0}
.collapse-content{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapse-content.open{max-height:2000px}
.collapse-arrow{transition:transform .3s ease}
.collapse-arrow.open{transform:rotate(180deg)}

/* === STICKY === */
.header-sticky{position:sticky;top:0;z-index:50;background:var(--bg);padding:12px 16px;border-bottom:1px solid var(--border)}
.footer-sticky{position:sticky;bottom:0;z-index:50;background:var(--bg);padding:12px 16px;border-top:1px solid var(--border)}

/* === DICE ANIMATION === */
@keyframes dice-shake{0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(-15deg) scale(1.1)}50%{transform:rotate(10deg) scale(.95)}75%{transform:rotate(-5deg) scale(1.05)}}
.dice-rolling{animation:dice-shake .15s infinite;display:inline-block}
.dice-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.dice-skip{position:absolute;top:16px;right:16px;font-size:1.5rem;opacity:.6;cursor:pointer;background:none;border:none;color:var(--text)}

/* === ANIMATIONS === */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:flex .2s ease}
.slide-up{animation:slideUp .3s ease}

/* === MISC === */
.balance-sheet{display:grid;grid-template-columns:1fr auto;gap:8px 16px;padding:4px 0}
.balance-sheet .label{color:var(--text-dim)}
.balance-sheet .value{text-align:right;font-weight:600}
.balance-sheet .total{border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.balance-sheet .total .label{color:var(--gold);font-weight:700}
.balance-sheet .total .value{color:var(--gold);font-weight:700;font-size:1.1rem}
.event-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.event-card .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.event-card .header .left{display:flex;align-items:center;gap:8px;font-weight:600}
.event-card .text{font-size:.9rem;color:var(--text-dim);line-height:1.5}
.event-card .tip{font-size:.8rem;color:var(--text-faint);margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)}
.setup-input{width:100%;font-size:1.5rem;text-align:center;padding:16px;background:var(--bg-elevated);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:inherit}
.setup-input:focus{border-color:var(--accent);outline:none}
.quick-select{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.quick-btn{flex:1;min-width:80px;min-height:44px;padding:10px;border:1px solid var(--border);border-radius:24px;background:var(--bg-elevated);color:var(--text);font-size:.85rem;cursor:pointer;transition:all .15s}
.quick-btn:active{transform:scale(.95);border-color:var(--accent)}
.setup-info{text-align:center;color:var(--text-faint);font-size:.85rem;margin-top:16px}
.backstory{font-style:italic;text-align:center;color:var(--text-dim);padding:20px 16px;font-size:.9rem;line-height:1.8}
.share-card{background:var(--bg-elevated);border:1px solid var(--border-bright);border-radius:12px;padding:16px;margin:16px 0;white-space:pre-wrap;font-size:.9rem;color:var(--text-dim)}
.share-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--accent);border:none;border-radius:24px;color:#fff;font-size:.95rem;font-weight:600;cursor:pointer}
.share-btn:active{transform:scale(.97)}
.glossary-search{width:100%;padding:12px 16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:1rem;margin-bottom:12px}
.glossary-search:focus{border-color:var(--accent);outline:none}
.glossary-item{padding:12px 0;border-bottom:1px solid var(--border)}
.glossary-item .term-name{font-weight:600;color:var(--accent)}
.glossary-item .term-short{color:var(--text-dim);font-size:.85rem;margin-top:2px}
.glossary-item .term-desc{font-size:.85rem;color:var(--text-dim);margin-top:8px;display:none}
.glossary-item.expanded .term-desc{display:block}
.glossary-item .term-example{font-size:.8rem;color:var(--text-faint);margin-top:6px;font-style:italic}
.float-btn{position:fixed;bottom:16px;right:16px;z-index:40;width:48px;height:48px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.float-btn:active{transform:scale(.9)}
.lang-btn{position:fixed;top:16px;right:16px;z-index:60;width:44px;height:44px;border-radius:50%;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lang-btn:active{transform:scale(.9)}
.replay-prompt{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;margin:12px 0}
.replay-prompt ul{list-style:none;padding:0;margin:8px 0}
.replay-prompt li{padding:4px 0;font-size:.85rem;color:var(--text-dim)}
.rank-badge{font-size:3rem;text-align:center;margin:16px 0}
.rank-name{text-align:center;font-size:1.2rem;font-weight:700;color:var(--gold)}
.rank-desc{text-align:center;color:var(--text-dim);font-size:.9rem;margin-bottom:16px}
.final-amount{text-align:center;font-size:2.5rem;font-weight:800;color:var(--gold);margin:8px 0}
.final-sub{text-align:center;color:var(--text-dim);font-size:1rem;margin-bottom:16px}
.highlight-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.highlight-card .hl-title{font-size:.8rem;color:var(--text-faint)}
.highlight-card .hl-value{font-size:1.1rem;font-weight:600;color:var(--text);margin-top:2px}
.scroll-hint{text-align:center;color:var(--text-faint);font-size:.8rem;padding:8px}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.loading-spinner{font-size:2rem;margin-bottom:16px;animation:dice-shake .5s infinite;display:inline-block}
</style>

function t(key) {
  var lang = I18N[currentLang] || I18N.en;
  var val = lang[key];
  if (val === undefined) {
    val = I18N.en[key];
    if (val === undefined) val = key;
  }
  return val;
}

function tFmt(key, args) {
  var template = t(key);
  if (!args) return template;
  var result = template;
  for (var i = 0; i < args.length; i++) {
    result = result.replace('{' + i + '}', args[i]);
  }
  return result;
}

function translateLogItem(logEntry) {
  // log entries from Rust are keys like "log.start_business" or "log.buy_stocks:val1:val2"
  if (!logEntry || typeof logEntry !== 'string') return logEntry;
  var parts = logEntry.split(':');
  var key = parts[0];
  // Check if it's a known log key
  var hasKey = (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key];
  if (!hasKey) return logEntry; // not a translation key, return as-is
  var args = parts.slice(1);
  return tFmt(key, args);
}

function translateEventFlavor(flavor) {
  if (!flavor || typeof flavor !== 'string') return flavor;
  return t(flavor);
}

function translateEventLog(logItem) {
  if (!logItem || typeof logItem !== 'string') return logItem;
  // log items like "event.re_01.log:area:price:pct"
  var parts = logItem.split(':');
  var key = parts[0];
  var hasKey = (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key];
  if (!hasKey) return logItem;
  var args = parts.slice(1);
  return tFmt(key, args);
}

function translateEventLogs(logs) {
  if (!logs) return [];
  return logs.map(function(l) { return translateEventLog(l); });
}

function getLangLabel() {
  if (currentLang === 'ko') return '한국어';
  if (currentLang === 'ja') return '日本語';
  return 'English';
}

function cycleLang() {
  var idx = LANGS.indexOf(currentLang);
  idx = (idx + 1) % LANGS.length;
  currentLang = LANGS[idx];
  localStorage.setItem('richman-lang', currentLang);
}

// === WebGPU DETECTION ===
async function isWebGPUAvailable() {
  if (!navigator.gpu) return false;
  try {
    const adapter = await navigator.gpu.requestAdapter();
    return !!adapter;
  } catch(e) { return false; }
}

// === WebLLM MODEL LOADING ===
async function ensureMLCEngine(onProgress) {
  if (mlcEngine) return mlcEngine;
  if (mlcLoading) return null; // already loading
  mlcLoading = true;
  try {
    const engine = await CreateMLCEngine(WEBLLM_MODEL, {
      initProgressCallback: function(report) {
        if (onProgress) onProgress(report);
      }
    });
    mlcEngine = engine;
    mlcLoading = false;
    return engine;
  } catch(e) {
    mlcLoading = false;
    throw e;
  }
}

// === RENDER AI MODEL LOADING SCREEN ===
function renderModelLoadingScreen() {
  var html = '<div class="loading-screen">';
  html += '<span class="loading-spinner">🤖</span>';

// === LLM DECISION GENERATION ===
async function generateLLMDecisions() {
  const context = engine.get_game_context();
  const lang = currentLang;
  const langName = lang === 'ko' ? 'Korean' : lang === 'ja' ? 'Japanese' : 'English';

  const systemPrompt = `You are a game master for "20億円の夢 — Rich Man Simulator", an economic simulation game. The player aims to accumulate 20億円 (2 billion yen) in 10 years.

Current game state (JSON):
${context}

Generate exactly 4 interesting decision options for this year. Each option should be contextually relevant to the player's current situation (assets, business, real estate, stocks).

Respond in ${langName}.

Return ONLY a JSON array, no markdown, no explanation:
[
  {"id": "custom_1", "label": "short title", "description": "1-line description", "category": "business|stocks|realestate|life|exit", "effects": {"cashDelta": 0, "stocksDelta": 0, "cryptoDelta": 0, "businessValueDelta": 0, "businessCashDelta": 0, "proptechDelta": 0, "rePriceDelta": 0}},
  ...4 items
]

Rules:
- Effects are in 万円 (10k yen) units
- cashDelta can be negative (cost) or positive (income)
- stocksDelta/cryptoDelta represent amount to buy (negative = sell)
- rePriceDelta is a percentage (0.1 = +10%)
- Make options fun and varied — some risky, some safe
- At least one option should relate to the player's current strategy
- Keep labels under 20 characters
- Keep descriptions under 60 characters`;

  const messages = [
    { role: "system", content: systemPrompt },
    { role: "user", content: `Generate 4 decisions for year ${JSON.parse(engine.get_state_json()).year}.` }
  ];

  const reply = await mlcEngine.chat.completions.create({
    messages,
    temperature: 0.8,
    max_tokens: 500,
  });

  let text = reply.choices[0].message.content.trim();
  // Strip markdown code fences if present
  text = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();

  try {
    var decisions = JSON.parse(text);
    if (!Array.isArray(decisions) || decisions.length === 0) throw new Error("empty");
    // Ensure each has required fields
    decisions = decisions.slice(0, 4);
    decisions.forEach(function(d) {
      if (!d.id) d.id = 'custom_' + Math.random().toString(36).substr(2, 6);
      if (!d.effects) d.effects = {};
      if (!d.category) d.category = 'life';
    });
    return decisions;
  } catch(e) {
    // Fallback to fixed decisions if LLM output is unparseable
    return JSON.parse(engine.get_decisions());
  }
}

// === LLM OUTCOME GENERATION ===
async function generateLLMOutcome(decision) {
  const context = engine.get_game_context();
  const lang = currentLang;
  const langName = lang === 'ko' ? 'Korean' : lang === 'ja' ? 'Japanese' : 'English';

  const prompt = `You are a game master for "Rich Man Simulator". The player chose:
${JSON.stringify(decision)}

Current state: ${context}

Generate the outcome narrative and updated effects. Respond in ${langName}.

Return ONLY JSON, no markdown:
{
  "narrative": "2-3 sentence story of what happened",
  "effects": {"cashDelta": 0, "stocksDelta": 0, "cryptoDelta": 0, "businessValueDelta": 0, "businessCashDelta": 0, "proptechDelta": 0, "rePriceDelta": 0, "log": "short log entry"},
  "gameOver": false
}

Rules:
- Effects in 万円 units
- Keep narrative fun and dramatic
- Make consequences realistic but interesting
- gameOver true only if bankruptcy or goal reached`;

  const reply = await mlcEngine.chat.completions.create({
    messages: [{ role: "user", content: prompt }],
    temperature: 0.7,
    max_tokens: 300,
  });

  let text = reply.choices[0].message.content.trim();
  text = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();

  try {
    return JSON.parse(text);
  } catch(e) {
    // Fallback: use fixed effects from the decision
    return {
      narrative: decision.description || '',
      effects: decision.effects || {},
      gameOver: false
    };
  }
}

// === FORMAT HELPERS (JS-side, for display) ===
function formatYen(wan) {
  if (wan >= 10000) return (wan / 10000).toFixed(1).replace(/\.0$/, '') + '億円';
  return Math.round(wan).toLocaleString() + '万円';
}
function formatPercent(num) { return (num >= 0 ? '+' : '') + (Math.round(num * 1000) / 10) + '%'; }
function processEventText(text) {
  return text.replace(/\[term:([^\]]+)\]/g, function(m, key) {
    return '<span class="term" data-term="' + key + '">' + key + '</span>';
  });
}

  var html = '<div style="padding:24px;min-height:100vh">';
  html += renderLangButton();
  html += '<div style="text-align:center;font-size:1.2rem;font-weight:600;color:var(--text-dim);margin-top:16px">' + t("ui.final_result") + '</div>';
  html += '<div class="final-amount">' + formatYen(total) + '</div>';
  html += '<div class="final-sub">' + t("ui.after_tax") + '</div>';
  html += '<div class="rank-badge">' + (rank.tier === 'gold' ? '🥇' : rank.tier === 'silver' ? '🥈' : rank.tier === 'bronze' ? '🥉' : rank.tier === 'iron' ? '⚓' : '🏅') + '</div>';
  html += '<div class="rank-name">' + t(rank.label) + '</div>';
  html += '<div class="rank-desc">' + t(rank.description) + '</div>';
  // Highlights
  html += '<div class="highlight-card"><div class="hl-title">' + t("ui.start_capital") + '</div><div class="hl-value">' + formatYen(state.startCapital) + '</div></div>';
  html += '<div class="highlight-card"><div class="hl-title">' + t("ui.growth_mult") + '</div><div class="hl-value">' + gm + 'x</div></div>';
  html += '<div class="highlight-card"><div class="hl-title">' + t("ui.duration") + '</div><div class="hl-value">' + state.duration + ' ' + (currentLang === 'en' ? 'yrs' : '年') + '</div></div>';
  // Breakdown
  html += '<div class="card"><div style="font-weight:600;margin-bottom:12px">' + t("ui.asset_breakdown") + '</div><div class="balance-sheet">';
  exitResult.breakdowns.forEach(function(b) {
    var catLabel = t(b.category);
    // If category has a colon (exit.category.realestate:area), split it
    if (b.category.indexOf(':') > -1) {
      var catParts = b.category.split(':');
      catLabel = t(catParts[0]) + ' (' + catParts[1] + ')';
    }
    html += '<span class="label">' + catLabel + '</span><span class="value">' + formatYen(b.net) + '</span>';
  });
  html += '<div class="total"><span class="label">' + t("ui.total") + '</span><span class="value">' + formatYen(total) + '</span></div>';
  html += '</div></div>';
  // Chart
  if (state.history && state.history.length > 0) {
    var maxVal = Math.max.apply(null, state.history.map(function(h) { return h.totalAssets; }));
    if (maxVal === 0) maxVal = 1;
    html += '<div class="card"><div style="font-weight:600;margin-bottom:12px">' + t("ui.chart") + '</div><div class="chart">';
    for (var i = 0; i < state.history.length; i++) {
      var h = state.history[i];
      var hgt = Math.max(4, Math.round(h.totalAssets / maxVal * 80));
      var isCurrent = (i === state.history.length - 1);
      html += '<div class="chart-bar' + (isCurrent ? ' current' : '') + '" style="height:' + hgt + 'px" title="Y' + h.year + ': ' + formatYen(h.totalAssets) + '"></div>';
    }
    html += '</div></div>';
  }
  // Share
  html += '<div class="share-card">' + shareText + '</div>';
  html += '<div style="display:flex;gap:8px;margin-bottom:16px"><button class="share-btn" data-action="copy-share" data-text="' + shareText.replace(/"/g, '&quot;').replace(/\n/g, '&#10;') + '">' + t("ui.copy") + '</button>';
  html += '<button class="share-btn" data-action="native-share" data-text="' + shareText.replace(/"/g, '&quot;').replace(/\n/g, '&#10;') + '">' + t("ui.share") + '</button></div>';
  // Replay
  html += '<div class="replay-prompt"><div style="font-weight:600;margin-bottom:8px">' + t("ui.try_again") + '</div><ul>';
  html += '<li>' + t("ui.try_again_1") + '</li><li>' + t("ui.try_again_2") + '</li><li>' + t("ui.try_again_3") + '</li></ul></div>';
  html += '<button class="btn btn-primary" data-action="replay">' + t("ui.replay") + '</button>';
  html += '</div>';
  app.innerHTML = html;
  saveLocalStats(total >= 200000);
  localStorage.removeItem('richman-save');
}

// === SCREEN: GLOSSARY ===
function renderGlossary() {
  if (glossaryData.length === 0) {
    try { glossaryData = JSON.parse(engine.get_glossary()); } catch(e) { glossaryData = []; }
  }
  var html = '<div class="tooltip-overlay" id="glossary-overlay"><div class="tooltip-card" style="max-width:400px;max-height:80vh;overflow-y:auto"><div style="font-weight:600;font-size:1.1rem;margin-bottom:12px">' + t("ui.glossary") + '</div>';
  html += '<input class="glossary-search" id="glossary-search" placeholder="' + t("ui.search") + '" data-action="glossary-search">';
  glossaryData.forEach(function(g) {
    var term = t(g.term);
    var short = t(g.short);
    var desc = t(g.desc);
    var example = t(g.example);
    html += '<div class="glossary-item" data-term-key="' + g.key + '"><div class="term-name">' + term + '</div><div class="term-short">' + short + '</div><div class="term-desc">' + desc + '</div><div class="term-example">' + (currentLang === 'en' ? 'e.g. ' : (currentLang === 'ja' ? '例) ' : '예) ')) + example + '</div></div>';
  });
  html += '<button class="btn" style="margin-top:16px" data-action="close-glossary">' + t("ui.close") + '</button></div></div>';
  var existing = document.getElementById('glossary-overlay');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  document.querySelectorAll('.glossary-item').forEach(function(item) {
    item.addEventListener('click', function() { item.classList.toggle('expanded'); });
  });
  var search = document.getElementById('glossary-search');
  if (search) {
    search.addEventListener('input', function(e) {
      var q = e.target.value.toLowerCase();
      document.querySelectorAll('.glossary-item').forEach(function(item) {
        var text = item.textContent.toLowerCase();
        item.style.display = text.indexOf(q) > -1 ? '' : 'none';
      });
    });
  }
}

// === TOOLTIP ===
function showTooltip(termKey) {
  if (glossaryData.length === 0) {
    try { glossaryData = JSON.parse(engine.get_glossary()); } catch(e) {}
  }
  var g = glossaryData.find(function(entry) { return entry.key === termKey || entry.term === termKey; });
  if (!g) return;
  var term = t(g.term);
  var short = t(g.short);
  var desc = t(g.desc);
  var example = t(g.example);
  var html = '<div class="tooltip-overlay" id="term-tooltip"><div class="tooltip-card"><div style="font-weight:600;font-size:1rem;color:var(--accent);margin-bottom:4px">📖 ' + term + '</div><div style="color:var(--text-dim);font-size:.85rem;margin-bottom:12px">' + short + '</div><div style="font-size:.9rem;line-height:1.6;margin-bottom:12px">' + desc + '</div><div style="font-size:.8rem;color:var(--text-faint);font-style:italic;margin-bottom:16px">' + (currentLang === 'en' ? 'e.g. ' : (currentLang === 'ja' ? '例) ' : '예) ')) + example + '</div><button class="btn" data-action="close-tooltip">' + t("ui.close") + '</button></div></div>';
  var existing = document.getElementById('term-tooltip');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('term-tooltip').addEventListener('click', function(e) {
    if (e.target === this || e.target.getAttribute('data-action') === 'close-tooltip') this.remove();
  });
}

// === START GAME ===
function startGame() {
  engine = new GameEngine(setupCapital, setupDuration, setupStrategy);
  saveGame();
  // If AI mode is enabled, check WebGPU and load model before showing decisions
  if (aiModeEnabled) {
    startGameWithAI();
  } else {
    renderDecisionScreen();
  }
}

async function startGameWithAI() {
  // Check WebGPU availability (cached)
  if (webgpuAvailable === null) {
    webgpuAvailable = await isWebGPUAvailable();
  }
  if (!webgpuAvailable) {
    // Show unavailable message, then fall back to classic
    app.innerHTML = '<div class="loading-screen"><span class="loading-spinner">⚠️</span><div style="color:var(--text);font-size:1rem;text-align:center;margin-bottom:16px">' + t("ui.ai_unavailable") + '</div><button class="btn btn-primary" style="max-width:240px" data-action="continue-classic">' + t("ui.classic_mode") + '</button></div>';
    return;
  }
  // If model already loaded, proceed directly
  if (mlcEngine) {
    renderDecisionScreen();
    return;
  }
  // Show loading screen and load model
  renderModelLoadingScreen();
  try {
    await ensureMLCEngine(updateModelLoadingProgress);
    renderDecisionScreen();
  } catch(e) {
    // Loading failed, fall back to classic
    console.warn('Model loading failed:', e);
    app.innerHTML = '<div class="loading-screen"><span class="loading-spinner">⚠️</span><div style="color:var(--text);font-size:1rem;text-align:center;margin-bottom:16px">' + t("ui.ai_error") + '</div><button class="btn btn-primary" style="max-width:240px" data-action="continue-classic">' + t("ui.classic_mode") + '</button></div>';
  }
}

// === DECISION HANDLER ===
function selectDecision(optId) {
  var dec = currentDecisions.find(function(d) { return d.id === optId; });
  if (!dec) return;
  // Exit decisions always use classic processing
  if (dec.id === 'exit_sell_all' || dec.id === 'exit_sell_biz') {
    engine.process_year(dec.id);
    renderEndScreen();
    return;
  }
  // AI mode: generate outcome via LLM
  if (aiModeEnabled && mlcEngine) {
    renderAIThinkingScreen("ui.ai_outcome");
    generateLLMOutcome(dec).then(function(outcome) {
      // First run base economy with hold_to_end to increment year
      var baseResult = JSON.parse(engine.process_year("hold_to_end"));
      // Then apply LLM-specific effects on top
      var effectResult = null;
      try {
        effectResult = JSON.parse(engine.apply_effects(JSON.stringify(outcome.effects || {})));
      } catch(e) {
        console.warn('apply_effects failed:', e);
      }
      // Build a merged result for rendering
      var mergedResult = baseResult;
      if (effectResult) {
        mergedResult.totalAssets = effectResult.totalAssets;
        mergedResult.cash = effectResult.cash;
        if (effectResult.gameOver) mergedResult.gameOver = true;
      }
      // Add AI narrative to events
      if (outcome.narrative) {
        if (!mergedResult.events) mergedResult.events = [];
        mergedResult.events.unshift({
          category: 'ai',
          flavor: 'ui.ai_narrative',
          logs: [outcome.narrative]
        });
      }
      // Add LLM log entry if present
      if (outcome.effects && outcome.effects.log) {
        if (!mergedResult.log) mergedResult.log = [];
        mergedResult.log.push(outcome.effects.log);
      }
      // Check for game over from outcome
      if (outcome.gameOver) mergedResult.gameOver = true;
      saveGame();
      animateDiceRoll(function() {
        renderYearResults(mergedResult);
      });
    }).catch(function(e) {
      // Fallback to classic mode for this turn
      console.warn('LLM outcome generation failed:', e);
      animateDiceRoll(function() {
        var result = JSON.parse(engine.process_year(dec.id));
        saveGame();
        renderYearResults(result);
      });
    });
    return;
  }
  // Classic mode: original behavior
  animateDiceRoll(function() {
    var result = JSON.parse(engine.process_year(dec.id));
    saveGame();
    renderYearResults(result);
  });
}

// === NEXT YEAR ===
function nextYear() {
  var state = JSON.parse(engine.get_state_json());
  if (state.year >= state.duration || state.gameOver) {
    renderEndScreen();
    return;
  }
  renderDecisionScreen();
}

// === EVENT DELEGATION ===
app.addEventListener('click', function(e) {
  var el = e.target;
  var actionEl = el.closest('[data-action]');
  if (!actionEl) {
    var termEl = el.closest('[data-term]');
    if (termEl) { showTooltip(termEl.getAttribute('data-term')); }
    return;
  }
  var action = actionEl.getAttribute('data-action');
  switch (action) {
    case 'cycle-lang':
      cycleLang();
      // Re-render current screen
      // Determine which screen we're on by checking DOM
      var langBtn = document.querySelector('.lang-btn');
      if (langBtn) {
        // Re-render by checking what's visible
        // Simplest: check if engine exists and is in-game
        if (engine && !engine.__destroyed) {
          var state = null;
          try { state = JSON.parse(engine.get_state_json()); } catch(e) {}
          if (state) {
            if (state.year > 0 && !state.game_over) {
              renderDecisionScreen();
            } else if (state.year > 0 && state.game_over) {
              renderEndScreen();
            } else {
              renderTitle();
            }
          } else {
            renderTitle();
          }
        } else {
          // Check if in setup
          if (setupStep > 0 || document.querySelector('.setup-input') || document.querySelector('.quick-select')) {
            renderSetup(setupStep);
          } else {
            renderTitle();
          }
        }
      } else {
        renderTitle();
      }
      // Also re-render glossary if open
      var go = document.getElementById('glossary-overlay');
      if (go) {
        go.remove();
        renderGlossary();
      }
      var tt = document.getElementById('term-tooltip');
      if (tt) {
        tt.remove();
      }
      break;
    case 'start':
      setupStep = 0;
      renderSetup(0);
      break;
    case 'resume':
      resumeGame();
      break;
    case 'glossary':
      renderGlossary();
      break;
    case 'close-glossary':
      var go2 = document.getElementById('glossary-overlay');
      if (go2) go2.remove();
      break;
    case 'close-tooltip':
      var tt2 = document.getElementById('term-tooltip');
      if (tt2) tt2.remove();
      break;
    case 'quick-capital':
      var v = parseInt(actionEl.getAttribute('data-value'));
      setupCapital = v;
      setupStep = 1;
      renderSetup(1);
      break;
    case 'next-capital':
      var input = document.getElementById('capital-input');
      var cv = parseInt(input.value);
      if (cv < 100 || isNaN(cv)) { input.style.borderColor = 'var(--red)'; return; }
      setupCapital = cv;
      setupStep = 1;
      renderSetup(1);
      break;
    case 'select-duration':
      setupDuration = parseInt(actionEl.getAttribute('data-value'));
      setupStep = 2;
      renderSetup(2);
      break;
    case 'select-strategy':
      setupStrategy = actionEl.getAttribute('data-value');
      startGame();
      break;
    case 'decision':
      selectDecision(actionEl.getAttribute('data-id'));
      break;
    case 'next-year':
      nextYear();
      break;
    case 'end-game':
      renderEndScreen();
      break;
    case 'continue-game':
      var ov = document.getElementById('goal-overlay');
      if (ov) ov.remove();
      break;
    case 'toggle-collapse':
      var targetId = actionEl.getAttribute('data-target');
      var target = document.getElementById(targetId);
      var arrow = actionEl.querySelector('.collapse-arrow');
      if (target) {
        if (target.classList.contains('open')) { target.classList.remove('open'); arrow.classList.remove('open'); }
        else { target.classList.add('open'); arrow.classList.add('open'); }
      }
      break;
    case 'copy-share':
      var text = actionEl.getAttribute('data-text').replace(/&#10;/g, '\n').replace(/&quot;/g, '"');
      navigator.clipboard.writeText(text).then(function() { actionEl.textContent = t("ui.copied"); });
      break;
    case 'native-share':
      var text2 = actionEl.getAttribute('data-text').replace(/&#10;/g, '\n').replace(/&quot;/g, '"');
      if (navigator.share) { navigator.share({ title: t("ui.title"), text: text2 }); }
      else { navigator.clipboard.writeText(text2).then(function() { actionEl.textContent = t("ui.copied"); }); }
      break;
    case 'replay':
      engine = null;
      localStorage.removeItem('richman-save');
      renderTitle();
      break;
    case 'skip-dice':
      break;
    case 'toggle-aimode':
      aiModeEnabled = !aiModeEnabled;
      localStorage.setItem('richman-aimode', aiModeEnabled ? 'true' : 'false');
      renderTitle();
      break;
    case 'cancel-ai-load':
      // Cancel model loading, fall back to classic mode
      aiModeEnabled = false;
      localStorage.setItem('richman-aimode', 'false');
      mlcLoading = false;
      renderDecisionScreenClassic();
      break;
    case 'continue-classic':
      // Continue in classic mode after AI unavailable/error
      aiModeEnabled = false;
      localStorage.setItem('richman-aimode', 'false');
      renderDecisionScreenClassic();
      break;
  }
});

// === BOOT ===
initWasm();
</script>
